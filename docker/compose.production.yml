name: crm-stack
services:
  # ─────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────
  crm_postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CRM_POSTGRES_DB}
      POSTGRES_USER: ${CRM_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${CRM_POSTGRES_USER} -d ${CRM_POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10

  crm_redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
      - --requirepass
      - ${CRM_REDIS_PASSWORD}
    volumes:
      - crm_redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a ${CRM_REDIS_PASSWORD} ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────────────
  # CRM (TETRABI fork — Rails app + Sidekiq)
  # ─────────────────────────────────────────────────────────────────
  evo_crm:
    image: ghcr.io/tetrabi/evo-ai-crm-community:latest
    restart: unless-stopped
    entrypoint: docker/entrypoints/rails.sh
    command: bundle exec rails server -b 0.0.0.0
    volumes:
      - crm_storage:/app/storage
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_MAX_THREADS: "5"
      SIDEKIQ_CONCURRENCY: "10"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      DOORKEEPER_JWT_SECRET_KEY: ${DOORKEEPER_JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: ${CRM_POSTGRES_HOST}
      POSTGRES_PORT: ${CRM_POSTGRES_PORT}
      POSTGRES_DATABASE: ${CRM_POSTGRES_DB}
      POSTGRES_USERNAME: ${CRM_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${CRM_POSTGRES_SSLMODE}
      REDIS_URL: ${CRM_REDIS_URL}
      FRONTEND_URL: ${CRM_FRONTEND_URL}
      BACKEND_URL: ${CRM_API_URL}
      CORS_ORIGINS: ${CRM_FRONTEND_URL},${CRM_API_URL}
      ACTIVE_STORAGE_SERVICE: local
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
      ENABLE_ACCOUNT_SIGNUP: "true"
      ENABLE_INBOX_EVENTS: "true"
      ENABLE_PUSH_RELAY_SERVER: "true"
      DISABLE_TELEMETRY: "true"
      FACEBOOK_API_VERSION: v23.0
      FB_APP_ID: ${FB_APP_ID}
      FB_APP_SECRET: ${FB_APP_SECRET}
      IG_VERIFY_TOKEN: ${IG_VERIFY_TOKEN}
      MFA_ISSUER: ${MFA_ISSUER}
      BOT_RUNTIME_URL: http://evo_bot_runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo_crm:3000
      EVO_AI_CORE_SERVICE_URL: http://evo_core:5555
      EVO_AUTH_SERVICE_URL: http://evo_auth:3001
      LOG_LEVEL: info
    depends_on:
      crm_postgres:
        condition: service_healthy
      crm_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ruby -e \"require 'socket'; TCPSocket.new('127.0.0.1', 3000)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      dokploy-network: {}
      default:
        aliases:
          - evo_crm
    labels:
      - traefik.enable=false

  evo_crm_sidekiq:
    image: ghcr.io/tetrabi/evo-ai-crm-community:latest
    restart: unless-stopped
    entrypoint: docker/entrypoints/rails.sh
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - crm_storage:/app/storage
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      POSTGRES_HOST: ${CRM_POSTGRES_HOST}
      POSTGRES_PORT: ${CRM_POSTGRES_PORT}
      POSTGRES_DATABASE: ${CRM_POSTGRES_DB}
      POSTGRES_USERNAME: ${CRM_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${CRM_POSTGRES_SSLMODE}
      REDIS_URL: ${CRM_REDIS_URL}
      FRONTEND_URL: ${CRM_FRONTEND_URL}
      BACKEND_URL: ${CRM_API_URL}
      ACTIVE_STORAGE_SERVICE: local
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
      FACEBOOK_API_VERSION: v23.0
      FB_APP_ID: ${FB_APP_ID}
      FB_APP_SECRET: ${FB_APP_SECRET}
      IG_VERIFY_TOKEN: ${IG_VERIFY_TOKEN}
      BOT_RUNTIME_URL: http://evo_bot_runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      DISABLE_TELEMETRY: "true"
      SIDEKIQ_CONCURRENCY: "10"
      LOG_LEVEL: info
    depends_on:
      evo_crm:
        condition: service_healthy
    networks:
      default:
        aliases:
          - evo_crm_sidekiq

  # ─────────────────────────────────────────────────────────────────
  # Gateway (nginx reverse proxy)
  # ─────────────────────────────────────────────────────────────────
  evo_gateway:
    image: evoapicloud/evo-crm-gateway:1.0.0-rc2
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      AUTH_UPSTREAM: evo_auth:3001
      CRM_UPSTREAM: evo_crm:3000
      CORE_UPSTREAM: evo_core:5555
      PROCESSOR_UPSTREAM: evo_processor:8000
      BOT_RUNTIME_UPSTREAM: evo_bot_runtime:8080
      NGINX_ENVSUBST_FILTER: "^(AUTH|CRM|CORE|PROCESSOR|BOT_RUNTIME)_UPSTREAM$"
    depends_on:
      crm_postgres:
        condition: service_healthy
      crm_redis:
        condition: service_healthy
      evo_crm:
        condition: service_healthy
      evo_auth:
        condition: service_started
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.portal-crmstack-1lpr10-37-web.rule=Host(`crm-api.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-37-web.entrypoints=web
      - traefik.http.services.portal-crmstack-1lpr10-37-web.loadbalancer.server.port=3030
      - traefik.http.routers.portal-crmstack-1lpr10-37-web.service=portal-crmstack-1lpr10-37-web
      - traefik.http.routers.portal-crmstack-1lpr10-37-web.middlewares=redirect-to-https@file
      - traefik.http.routers.portal-crmstack-1lpr10-37-websecure.rule=Host(`crm-api.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-37-websecure.entrypoints=websecure
      - traefik.http.services.portal-crmstack-1lpr10-37-websecure.loadbalancer.server.port=3030
      - traefik.http.routers.portal-crmstack-1lpr10-37-websecure.service=portal-crmstack-1lpr10-37-websecure
      - traefik.http.routers.portal-crmstack-1lpr10-37-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default

  # ─────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────
  evo_frontend:
    image: evoapicloud/evo-ai-frontend-community:1.0.0-rc2
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      VITE_API_URL: ${CRM_API_URL}
      VITE_AUTH_API_URL: ${CRM_API_URL}
      VITE_EVOAI_API_URL: ${CRM_API_URL}
      VITE_AGENT_PROCESSOR_URL: ${CRM_API_URL}
      VITE_APP_ENV: production
    depends_on:
      evo_gateway:
        condition: service_started
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.portal-crmstack-1lpr10-36-web.rule=Host(`crm.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-36-web.entrypoints=web
      - traefik.http.services.portal-crmstack-1lpr10-36-web.loadbalancer.server.port=80
      - traefik.http.routers.portal-crmstack-1lpr10-36-web.service=portal-crmstack-1lpr10-36-web
      - traefik.http.routers.portal-crmstack-1lpr10-36-web.middlewares=redirect-to-https@file
      - traefik.http.routers.portal-crmstack-1lpr10-36-websecure.rule=Host(`crm.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-36-websecure.entrypoints=websecure
      - traefik.http.services.portal-crmstack-1lpr10-36-websecure.loadbalancer.server.port=80
      - traefik.http.routers.portal-crmstack-1lpr10-36-websecure.service=portal-crmstack-1lpr10-36-websecure
      - traefik.http.routers.portal-crmstack-1lpr10-36-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default

  # ─────────────────────────────────────────────────────────────────
  # Auth service (Rails) + Sidekiq
  # ─────────────────────────────────────────────────────────────────
  evo_auth:
    image: evoapicloud/evo-auth-service-community:main-e4ba108
    restart: unless-stopped
    command:
      - sh
      - -c
      - "echo 'Rails.application.config.to_prepare { User.class_eval { def setup_survey_completed?; true; end } }' > /rails/config/initializers/z_fix_survey.rb && bundle exec rails db:migrate && bundle exec rails s -p 3001 -b 0.0.0.0"
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_MAX_THREADS: "5"
      SIDEKIQ_CONCURRENCY: "10"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      DOORKEEPER_JWT_SECRET_KEY: ${DOORKEEPER_JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: ${CRM_POSTGRES_HOST}
      POSTGRES_PORT: ${CRM_POSTGRES_PORT}
      POSTGRES_DATABASE: ${CRM_POSTGRES_DB}
      POSTGRES_USERNAME: ${CRM_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${CRM_POSTGRES_SSLMODE}
      REDIS_URL: ${CRM_REDIS_URL}
      FRONTEND_URL: ${CRM_FRONTEND_URL}
      BACKEND_URL: ${CRM_API_URL}
      CORS_ORIGINS: ${CRM_FRONTEND_URL},${CRM_API_URL}
      ACTIVE_STORAGE_SERVICE: local
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
      ENABLE_ACCOUNT_SIGNUP: "true"
      ENABLE_INBOX_EVENTS: "true"
      ENABLE_PUSH_RELAY_SERVER: "true"
      DISABLE_TELEMETRY: "true"
      MFA_ISSUER: ${MFA_ISSUER}
      LOG_LEVEL: info
    depends_on:
      crm_postgres:
        condition: service_healthy
      crm_redis:
        condition: service_healthy

  evo_auth_sidekiq:
    image: evoapicloud/evo-auth-service-community:main-e4ba108
    restart: unless-stopped
    command:
      - bundle
      - exec
      - sidekiq
      - -C
      - config/sidekiq.yml
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_MAX_THREADS: "5"
      SIDEKIQ_CONCURRENCY: "10"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      DOORKEEPER_JWT_SECRET_KEY: ${DOORKEEPER_JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: ${CRM_POSTGRES_HOST}
      POSTGRES_PORT: ${CRM_POSTGRES_PORT}
      POSTGRES_DATABASE: ${CRM_POSTGRES_DB}
      POSTGRES_USERNAME: ${CRM_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${CRM_POSTGRES_SSLMODE}
      REDIS_URL: ${CRM_REDIS_URL}
      FRONTEND_URL: ${CRM_FRONTEND_URL}
      BACKEND_URL: ${CRM_API_URL}
      CORS_ORIGINS: ${CRM_FRONTEND_URL},${CRM_API_URL}
      ACTIVE_STORAGE_SERVICE: local
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
      DISABLE_TELEMETRY: "true"
      LOG_LEVEL: info
    depends_on:
      evo_auth:
        condition: service_started
      crm_redis:
        condition: service_healthy
    networks:
      - default

  # ─────────────────────────────────────────────────────────────────
  # Core service (Go)
  # ─────────────────────────────────────────────────────────────────
  evo_core:
    image: evoapicloud/evo-ai-core-service-community:main-5bb99ca
    restart: unless-stopped
    command:
      - ./entrypoint.sh
    environment:
      TZ: ${TZ}
      PORT: "5555"
      DB_HOST: ${CRM_POSTGRES_HOST}
      DB_PORT: ${CRM_POSTGRES_PORT}
      DB_NAME: ${CRM_POSTGRES_DB}
      DB_USER: ${CRM_POSTGRES_USER}
      DB_PASSWORD: ${CRM_POSTGRES_PASSWORD}
      DB_SSLMODE: ${CRM_POSTGRES_SSLMODE}
      DB_MAX_OPEN_CONNS: "100"
      DB_MAX_IDLE_CONNS: "10"
      DB_CONN_MAX_LIFETIME: 1h
      DB_CONN_MAX_IDLE_TIME: 30m
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EVOLUTION_BASE_URL: http://evo_crm:3000
      EVO_AUTH_BASE_URL: http://evo_auth:3001
      AI_PROCESSOR_URL: http://evo_processor:8000
      AI_PROCESSOR_VERSION: v1
    depends_on:
      crm_postgres:
        condition: service_healthy
      crm_redis:
        condition: service_healthy
      evo_crm:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────
  # AI Processor (Python/FastAPI)
  # ─────────────────────────────────────────────────────────────────
  evo_processor:
    image: evoapicloud/evo-ai-processor-community:main-981b233
    restart: unless-stopped
    command:
      - sh
      - -c
      - alembic upgrade head && python -m scripts.run_seeders && uvicorn src.main:app --host $HOST --port $PORT
    environment:
      TZ: ${TZ}
      HOST: 0.0.0.0
      PORT: "8000"
      DEBUG: "false"
      API_TITLE: Agent Processor Community
      API_DESCRIPTION: Agent Processor Community for Evo AI
      API_VERSION: 1.0.0
      APP_URL: ${CRM_API_URL}
      API_URL: ${CRM_API_URL}
      ORGANIZATION_NAME: ${ORGANIZATION_NAME}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_CONNECTION_STRING: postgresql://${CRM_POSTGRES_USER}:${CRM_POSTGRES_PASSWORD}@${CRM_POSTGRES_HOST}:${CRM_POSTGRES_PORT}/${CRM_POSTGRES_DB}
      REDIS_HOST: crm_redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_PASSWORD: ${CRM_REDIS_PASSWORD}
      REDIS_TTL: "3600"
      REDIS_SSL: "false"
      REDIS_KEY_PREFIX: "a2a:"
      CORE_SERVICE_URL: http://evo_core:5555/api/v1
      EVO_AI_CRM_URL: http://evo_crm:3000
      EVO_AUTH_BASE_URL: http://evo_auth:3001
      KNOWLEDGE_SERVICE_URL: http://evonexus_dashboard:8080/api/knowledge/v1
      KNOWLEDGE_SERVICE_API_TOKEN: ${NEXUS_API_KEY}
      TOOLS_CACHE_ENABLED: "true"
      TOOLS_CACHE_TTL: "3600"
    volumes:
      - evo_processor_logs:/app/logs
    depends_on:
      crm_postgres:
        condition: service_healthy
      crm_redis:
        condition: service_healthy
      evo_core:
        condition: service_started

  # ─────────────────────────────────────────────────────────────────
  # Bot Runtime (Go)
  # ─────────────────────────────────────────────────────────────────
  evo_bot_runtime:
    image: evoapicloud/evo-bot-runtime:main-f3cccb7
    restart: unless-stopped
    command:
      - ./evo-bot-runtime
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      REDIS_URL: ${CRM_REDIS_URL}
      AI_PROCESSOR_URL: http://evo_processor:8000
      AI_CALL_TIMEOUT_SECONDS: "30"
    depends_on:
      evo_processor:
        condition: service_started
    networks:
      - default

  # ─────────────────────────────────────────────────────────────────
  # Evolution API
  # ─────────────────────────────────────────────────────────────────
  evolution_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EVOLUTION_POSTGRES_DB}
      POSTGRES_USER: ${EVOLUTION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${EVOLUTION_POSTGRES_USER} -d ${EVOLUTION_POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10

  evolution_redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
      - --requirepass
      - ${EVOLUTION_REDIS_PASSWORD}
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a ${EVOLUTION_REDIS_PASSWORD} ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 10

  evolution_api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      LANGUAGE: ${LANGUAGE:-pt-BR}
      TELEMETRY: ${TELEMETRY:-false}
      AUTHENTICATION_TYPE: ${AUTHENTICATION_TYPE:-apikey}
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: ${AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES:-true}
      CONFIG_SESSION_PHONE_CLIENT: ${CONFIG_SESSION_PHONE_CLIENT}
      CONFIG_SESSION_PHONE_NAME: ${CONFIG_SESSION_PHONE_NAME}
      QRCODE_LIMIT: ${QRCODE_LIMIT}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgresql}
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI}
      DATABASE_CONNECTION_CLIENT_NAME: ${DATABASE_CONNECTION_CLIENT_NAME:-evolution_crm}
      DATABASE_SAVE_DATA_INSTANCE: ${DATABASE_SAVE_DATA_INSTANCE:-true}
      DATABASE_SAVE_DATA_NEW_MESSAGE: ${DATABASE_SAVE_DATA_NEW_MESSAGE:-true}
      DATABASE_SAVE_MESSAGE_UPDATE: ${DATABASE_SAVE_MESSAGE_UPDATE:-true}
      DATABASE_SAVE_DATA_CONTACTS: ${DATABASE_SAVE_DATA_CONTACTS:-true}
      DATABASE_SAVE_DATA_CHATS: ${DATABASE_SAVE_DATA_CHATS:-true}
      DATABASE_SAVE_DATA_LABELS: ${DATABASE_SAVE_DATA_LABELS:-true}
      DATABASE_SAVE_DATA_HISTORIC: ${DATABASE_SAVE_DATA_HISTORIC:-true}
      CACHE_REDIS_ENABLED: ${CACHE_REDIS_ENABLED:-true}
      CACHE_REDIS_URI: ${CACHE_REDIS_URI}
      CACHE_REDIS_PREFIX_KEY: ${CACHE_REDIS_PREFIX_KEY:-evolution}
      CACHE_REDIS_SAVE_INSTANCES: ${CACHE_REDIS_SAVE_INSTANCES:-true}
      CACHE_LOCAL_ENABLED: ${CACHE_LOCAL_ENABLED:-false}
      WEBHOOK_GLOBAL_ENABLED: ${WEBHOOK_GLOBAL_ENABLED:-false}
      WEBHOOK_GLOBAL_URL: ${WEBHOOK_GLOBAL_URL}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: ${WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      CORS_METHODS: ${CORS_METHODS:-GET,POST,PUT,DELETE}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      evolution_postgres:
        condition: service_healthy
      evolution_redis:
        condition: service_healthy
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.portal-crmstack-1lpr10-38-web.rule=Host(`evo.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-38-web.entrypoints=web
      - traefik.http.services.portal-crmstack-1lpr10-38-web.loadbalancer.server.port=8080
      - traefik.http.routers.portal-crmstack-1lpr10-38-web.service=portal-crmstack-1lpr10-38-web
      - traefik.http.routers.portal-crmstack-1lpr10-38-web.middlewares=redirect-to-https@file
      - traefik.http.routers.portal-crmstack-1lpr10-38-websecure.rule=Host(`evo.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-38-websecure.entrypoints=websecure
      - traefik.http.services.portal-crmstack-1lpr10-38-websecure.loadbalancer.server.port=8080
      - traefik.http.routers.portal-crmstack-1lpr10-38-websecure.service=portal-crmstack-1lpr10-38-websecure
      - traefik.http.routers.portal-crmstack-1lpr10-38-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default

  # ─────────────────────────────────────────────────────────────────
  # n8n (BPA)
  # ─────────────────────────────────────────────────────────────────
  n8n_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DB}
      POSTGRES_USER: ${N8N_POSTGRES_USER}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${N8N_POSTGRES_USER} -d ${N8N_POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:1.123.42
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_WEBHOOK_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-1}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED:-false}
      N8N_HIRING_BANNER_ENABLED: ${N8N_HIRING_BANNER_ENABLED:-false}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n_postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB}
      DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD}
      EXECUTIONS_DATA_SAVE_ON_ERROR: ${EXECUTIONS_DATA_SAVE_ON_ERROR:-all}
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: ${EXECUTIONS_DATA_SAVE_ON_SUCCESS:-none}
      EXECUTIONS_DATA_PRUNE: ${EXECUTIONS_DATA_PRUNE:-true}
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-336}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
      MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n_postgres:
        condition: service_healthy
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.portal-crmstack-1lpr10-39-web.rule=Host(`bpa.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-39-web.entrypoints=web
      - traefik.http.services.portal-crmstack-1lpr10-39-web.loadbalancer.server.port=5678
      - traefik.http.routers.portal-crmstack-1lpr10-39-web.service=portal-crmstack-1lpr10-39-web
      - traefik.http.routers.portal-crmstack-1lpr10-39-web.middlewares=redirect-to-https@file
      - traefik.http.routers.portal-crmstack-1lpr10-39-websecure.rule=Host(`bpa.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-39-websecure.entrypoints=websecure
      - traefik.http.services.portal-crmstack-1lpr10-39-websecure.loadbalancer.server.port=5678
      - traefik.http.routers.portal-crmstack-1lpr10-39-websecure.service=portal-crmstack-1lpr10-39-websecure
      - traefik.http.routers.portal-crmstack-1lpr10-39-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default

  # ─────────────────────────────────────────────────────────────────
  # EvoNexus (Dashboard + Runtime)
  # ─────────────────────────────────────────────────────────────────
  evonexus_dashboard:
    image: evoapicloud/evo-nexus-dashboard:v0.33.0
    restart: unless-stopped
    command: |
      bash -c "cd /workspace/dashboard/backend && uv pip install websocket-client && ln -sf /workspace/dashboard/terminal-server/node_modules/@anthropic-ai/claude-agent-sdk-linux-x64/claude /usr/local/bin/claude && /usr/local/bin/start-dashboard.sh"
    environment:
      TZ: ${TZ}
      EVONEXUS_PORT: "8080"
      TERMINAL_SERVER_PORT: "32352"
      FORWARDED_ALLOW_IPS: "*"
      APP_URL: ${NEXUS_URL:-}
      FRONTEND_URL: ${NEXUS_URL:-}
      CORS_ALLOWED_ORIGINS: ${NEXUS_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - evonexus_config:/workspace/config
      - evonexus_workspace:/workspace/workspace
      - evonexus_dashboard_data:/workspace/dashboard/data
      - evonexus_memory:/workspace/memory
      - evonexus_adw_logs:/workspace/ADWs/logs
      - evonexus_agent_memory:/workspace/.claude/agent-memory
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:8080/api/version
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.portal-crmstack-1lpr10-40-web.rule=Host(`nexus.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-40-web.entrypoints=web
      - traefik.http.services.portal-crmstack-1lpr10-40-web.loadbalancer.server.port=8080
      - traefik.http.routers.portal-crmstack-1lpr10-40-web.service=portal-crmstack-1lpr10-40-web
      - traefik.http.routers.portal-crmstack-1lpr10-40-web.middlewares=redirect-to-https@file
      - traefik.http.routers.portal-crmstack-1lpr10-40-websecure.rule=Host(`nexus.ynaiapiedade.com.br`)
      - traefik.http.routers.portal-crmstack-1lpr10-40-websecure.entrypoints=websecure
      - traefik.http.services.portal-crmstack-1lpr10-40-websecure.loadbalancer.server.port=8080
      - traefik.http.routers.portal-crmstack-1lpr10-40-websecure.service=portal-crmstack-1lpr10-40-websecure
      - traefik.http.routers.portal-crmstack-1lpr10-40-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default

  evonexus_runtime:
    image: evoapicloud/evo-nexus-runtime:v0.33.0
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      REQUIRE_ANTHROPIC_KEY: "0"
    volumes:
      - evonexus_config:/workspace/config
      - evonexus_workspace:/workspace/workspace
      - evonexus_memory:/workspace/memory
      - evonexus_adw_logs:/workspace/ADWs/logs
      - evonexus_agent_memory:/workspace/.claude/agent-memory
    stdin_open: true
    tty: true
    depends_on:
      evonexus_dashboard:
        condition: service_healthy

volumes:
  crm_postgres_data: null
  crm_redis_data: null
  crm_storage: null
  evo_processor_logs: null
  evolution_postgres_data: null
  evolution_redis_data: null
  evolution_instances: null
  evolution_store: null
  n8n_postgres_data: null
  n8n_data: null
  evonexus_config: null
  evonexus_workspace: null
  evonexus_dashboard_data: null
  evonexus_memory: null
  evonexus_adw_logs: null
  evonexus_agent_memory: null

networks:
  dokploy-network:
    external: true
